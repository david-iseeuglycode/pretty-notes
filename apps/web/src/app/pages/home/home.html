@if (auth.currentUser(); as user) {
  <div>
    <h2>Your notes</h2>

    @if (loading() === true)
    {
      <p>Loading...</p>
    } @else {
      @if (notes().length === 0) {
        <p>No notes yet.</p>
      } @else {
        <ul>
          @for (note of notes(); track note.id) {
            <li><button (click)="openNote(note.id)">{{ note.title }}</button></li>
          }
        </ul>
      }
    }

    <h3>New note</h3>
    <input [(ngModel)]="newNoteTitle" placeholder="Title" />
    <button (click)="createNote()">Create</button>
  </div>
}
